<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление удаленными клиентами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #667eea;
        }
        
        .stat-card h3 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 5px;
        }
        
        .stat-card p {
            color: #666;
            font-size: 0.9em;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .clients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .client-card {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .client-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .client-card.connected {
            border-left: 4px solid #28a745;
        }
        
        .client-card.disconnected {
            border-left: 4px solid #dc3545;
        }
        
        .client-info {
            margin-bottom: 15px;
        }
        
        .client-info h4 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .client-info p {
            color: #666;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .status-connected {
            background: #d4edda;
            color: #155724;
        }
        
        .status-disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        
        .command-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .form-group textarea {
            height: 100px;
            resize: vertical;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-1px);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .logs {
            background: #1e1e1e;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding: 2px 0;
        }
        
        .log-info {
            color: #66d9ef;
        }
        
        .log-success {
            color: #a6e22e;
        }
        
        .log-error {
            color: #f92672;
        }
        
        .log-warning {
            color: #e6db74;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Управление удаленными клиентами</h1>
            <p>Мониторинг и управление подключенными клиентами</p>
        </div>
        
        <div class="content">
            <!-- Статистика -->
            <div class="stats" id="stats">
                <div class="stat-card">
                    <h3 id="connected-count">0</h3>
                    <p>Подключенных клиентов</p>
                </div>
                <div class="stat-card">
                    <h3 id="total-count">0</h3>
                    <p>Всего клиентов</p>
                </div>
                <div class="stat-card">
                    <h3 id="commands-count">0</h3>
                    <p>Отправлено команд</p>
                </div>
            </div>
            
            <!-- Клиенты -->
            <div class="section">
                <h2>📱 Подключенные клиенты</h2>
                <div class="clients-grid" id="clients-grid">
                    <div class="client-card">
                        <div class="client-info">
                            <h4>Загрузка...</h4>
                            <p>Получение списка клиентов...</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Отправка команд -->
            <div class="section">
                <h2>💻 Отправка команд</h2>
                <div class="command-form">
                    <div class="form-group">
                        <label for="target-client">Целевой клиент:</label>
                        <select id="target-client">
                            <option value="all">Все клиенты</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="command">Команда:</label>
                        <input type="text" id="command" placeholder="ls -la" value="ls -la">
                    </div>
                    <div class="form-group">
                        <label for="args">Аргументы (через пробел):</label>
                        <input type="text" id="args" placeholder="-l -h">
                    </div>
                    <div class="form-group">
                        <label for="timeout">Таймаут (секунды):</label>
                        <input type="number" id="timeout" value="30" min="1" max="300">
                    </div>
                    <div class="btn-group">
                        <button class="btn" onclick="sendCommand()">📤 Отправить команду</button>
                        <button class="btn btn-success" onclick="sendBroadcast()">📢 Отправить всем</button>
                    </div>
                </div>
            </div>
            
            <!-- Логи -->
            <div class="section">
                <h2>📋 Логи</h2>
                <div class="logs" id="logs">
                    <div class="log-entry log-info">Система запущена. Ожидание подключений...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5001/api';
        let clients = [];
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
            loadClients();
            updateClientsList();
            
            // Обновляем данные каждые 5 секунд
            setInterval(() => {
                loadStats();
                loadClients();
            }, 5000);
        });
        
        // Загрузка статистики
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/stats`);
                const data = await response.json();
                
                document.getElementById('connected-count').textContent = data.connected_clients;
                document.getElementById('total-count').textContent = data.total_clients;
                document.getElementById('commands-count').textContent = data.commands_sent;
            } catch (error) {
                addLog('Ошибка загрузки статистики: ' + error.message, 'error');
            }
        }
        
        // Загрузка списка клиентов
        async function loadClients() {
            try {
                const response = await fetch(`${API_BASE}/clients`);
                const data = await response.json();
                clients = data.clients;
                updateClientsList();
                updateTargetClients();
            } catch (error) {
                addLog('Ошибка загрузки клиентов: ' + error.message, 'error');
            }
        }
        
        // Обновление списка клиентов
        function updateClientsList() {
            const grid = document.getElementById('clients-grid');
            
            if (clients.length === 0) {
                grid.innerHTML = '<div class="client-card"><div class="client-info"><h4>Нет подключенных клиентов</h4><p>Ожидание подключений...</p></div></div>';
                return;
            }
            
            grid.innerHTML = clients.map(client => `
                <div class="client-card ${client.status}">
                    <div class="client-info">
                        <h4>${client.hostname}</h4>
                        <p><strong>ID:</strong> ${client.id}</p>
                        <p><strong>IP:</strong> ${client.ip}</p>
                        <p><strong>Статус:</strong> <span class="status-badge status-${client.status}">${client.status}</span></p>
                        <p><strong>Подключен:</strong> ${new Date(client.connected_at).toLocaleString()}</p>
                        <p><strong>Последний heartbeat:</strong> ${new Date(client.last_heartbeat).toLocaleString()}</p>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-danger" onclick="disconnectClient('${client.id}')">Отключить</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Обновление списка целевых клиентов
        function updateTargetClients() {
            const select = document.getElementById('target-client');
            const currentValue = select.value;
            
            select.innerHTML = '<option value="all">Все клиенты</option>';
            
            clients.forEach(client => {
                const option = document.createElement('option');
                option.value = client.id;
                option.textContent = `${client.hostname} (${client.id})`;
                select.appendChild(option);
            });
            
            // Восстанавливаем выбранное значение
            if (currentValue && clients.some(c => c.id === currentValue)) {
                select.value = currentValue;
            }
        }
        
        // Отправка команды
        async function sendCommand() {
            const targetClient = document.getElementById('target-client').value;
            const command = document.getElementById('command').value;
            const args = document.getElementById('args').value.split(' ').filter(arg => arg.trim());
            const timeout = parseInt(document.getElementById('timeout').value);
            
            if (!command.trim()) {
                addLog('Введите команду!', 'warning');
                return;
            }
            
            try {
                addLog(`Отправка команды "${command}" клиенту ${targetClient}...`, 'info');
                
                const response = await fetch(`${API_BASE}/commands`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        target_client: targetClient,
                        command: command,
                        args: args,
                        timeout: timeout
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    addLog(`Команда отправлена. ID: ${result.command_id}`, 'success');
                } else {
                    addLog(`Ошибка отправки команды: ${result.error}`, 'error');
                }
            } catch (error) {
                addLog('Ошибка отправки команды: ' + error.message, 'error');
            }
        }
        
        // Отправка сообщения всем
        async function sendBroadcast() {
            const message = prompt('Введите сообщение для всех клиентов:');
            if (!message) return;
            
            try {
                addLog(`Отправка сообщения всем клиентам: "${message}"`, 'info');
                
                const response = await fetch(`${API_BASE}/broadcast`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    addLog('Сообщение отправлено всем клиентам', 'success');
                } else {
                    addLog(`Ошибка отправки сообщения: ${result.error}`, 'error');
                }
            } catch (error) {
                addLog('Ошибка отправки сообщения: ' + error.message, 'error');
            }
        }
        
        // Отключение клиента
        async function disconnectClient(clientId) {
            if (!confirm(`Отключить клиент ${clientId}?`)) return;
            
            try {
                const response = await fetch(`${API_BASE}/clients/${clientId}/disconnect`, {
                    method: 'POST'
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    addLog(`Клиент ${clientId} отключен`, 'success');
                    loadClients(); // Обновляем список
                } else {
                    addLog(`Ошибка отключения клиента: ${result.error}`, 'error');
                }
            } catch (error) {
                addLog('Ошибка отключения клиента: ' + error.message, 'error');
            }
        }
        
        // Добавление записи в лог
        function addLog(message, type = 'info') {
            const logs = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            
            logs.appendChild(entry);
            logs.scrollTop = logs.scrollHeight;
            
            // Ограничиваем количество записей
            while (logs.children.length > 100) {
                logs.removeChild(logs.firstChild);
            }
        }
    </script>
</body>
</html>
